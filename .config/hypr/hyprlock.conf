# TIME
label {
    monitor =
    text = $TIME # ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#variable-substitution
    color = $text
    font_size = 90
    font_family = $font

    position = -30, 0
    halign = right
    valign = top
}

# DATE
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y" # update every 60 seconds
    color = $text
    font_size = 25
    font_family = $font

    position = -30, -150
    halign = right
    valign = top
}

# APAGAR
label {
    monitor =
    text = ⏻
    font_size = 38
    color = $text
    onclick = systemctl poweroff

    position = 0, -305		#-80 de dist del input
    halign = center
    valign = center
}

label {
    monitor =
    text = 🗘
    font_size = 25
    color = $text
    onclick = systemctl reboot

    position = -50, -310		#-85 de dist del input
    halign = center
    valign = center
}

label {
    monitor =
    text = 
    font_size = 22
    color = $text
    onclick = systemctl suspend

    position = 50, -305		#-80 de dist del input
    halign = center
    valign = center
}

