# INPUT FIELD
input-field {
    monitor =
    size = 200, 50
    outline_thickness = -1
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = false
    outer_color = rgba(0, 0, 0, 0)
    inner_color =rgba(0, 0, 0, 0)
    font_color = rgb(255, 255, 255)
    fade_on_empty = false
    fail_text = $FAIL
    dots_text_format = *
    placeholder_text =
    hide_input = false
    position = 800 , -15
    halign = left
    valign = center
}

#{reproductor} | {artista} - {cancion} | {length} | {estado}
shape {
    monitor =
    size = 665, 55
    color = rgba(0, 0, 0, 1)
    rounding = 0
    border_size = 2
    border_color = rgba(0, 0, 0, 0)
    rotate = 0
    position = 0, -499
    halign = center
    valign = center
    zindex = 5
}
shape {
    monitor =
    size = 650, 40
    color = rgba(0, 0, 0, 1)
    rounding = 0
    border_size = 2
    border_color = rgba(200, 200, 200, 1)
    rotate = 0
    position = 0, -499
    halign = center
    valign = center
