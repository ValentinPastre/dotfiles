}
# PLAYER SOURCE
label {
    monitor =
    text = cmd[update:1000] echo "$($music --source) | $($music --artist) - $($music --title) | $($music --length) | $($music --status)"
    color = rgba(255, 255, 255, 1)
    font_size = 11
    position = 0, -499
    halign = center
    valign = center
    zindex = 5
}

# NOTIFICATION
