$music = $HOME/.config/hypr/hyprlock/music.sh

# GENERAL
general {
    no_fade_in = true
    no_fade_out = true
    disable_loading_bar = false
    hide_cursor = true
    immediate_render = true
}

animations {
	enabled = false
}

# BACKGROUND
background {
    monitor =
    path = $HOME/.config/hypr/wallpapers/gruvbox-waves.png
    color = rgb(0, 0, 0)
    blur_passes = 0
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.8916
    vibrancy_darkness = 0.0
}

# Day-Month-Date
shape {
    monitor =
    size = 325, 40
    color =rgba(0, 0, 0, 1)
    rounding = 0
    border_size = 2
    border_color = rgba(200, 200, 200, 1)
    rotate = 0
    position = 0, 499
    halign = center
    valign = center
    zindex = 1
}
shape {
    monitor =
    size = 340, 55
    color =rgba(0, 0, 0, 1)
    rounding = 0
    border_size = 2
    border_color = rgba(0, 0, 0, 0)
    rotate = 0
    position = 0, 499
    halign = center
    valign = center
}
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A, %B %d - %H:%M")"
    color = rgb(200, 200, 200)
    font_size = 15
    position = 0, 500
    halign = center
    valign = center
    zindex = 1
}



shape {
    monitor =
    size = 525, 125
    color =rgba(0, 0, 0, 1)
    rounding = 0
    border_size = 2
    border_color = rgba(0, 0, 0, 0)
    rotate = 0
    position = 0, 0
    halign = center
    valign = center
}
